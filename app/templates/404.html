{% extends 'base.html' %}

{% block content %}
<div class="container h-100 d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="command-panel p-5 text-center" style="max-width: 500px;">
        <i class="fa-solid fa-plane-slash fa-4x text-danger mb-4"></i>
        <h1 class="h3 font-weight-bold mb-2" style="font-family: var(--font-outfit); font-weight: 700;">404 - Page Not Found</h1>
        <p class="text-muted small mb-4">The page or outlet record you are searching for does not exist in our spatial database.</p>
        <a href="{{ url_for('dashboard.view_dashboard') }}" class="btn-glass btn-blue text-white w-100 justify-content-center">
            <i class="fa-solid fa-chart-pie me-1"></i> Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
